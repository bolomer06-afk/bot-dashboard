<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bot Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #0b0f1a, #05070d);
color:#e5e7eb;
}

/* Sidebar */
.sidebar{
width:240px;
height:100vh;
position:fixed;
background: linear-gradient(180deg,#0f172a,#05070d);
padding:20px;
border-right:1px solid #1f2937;
}

.logo{
font-size:20px;
font-weight:bold;
color:#facc15;
margin-bottom:20px;
letter-spacing:2px;
}

.menu p{
margin:15px 0;
color:#9ca3af;
cursor:pointer;
}
.menu p:hover{
color:#facc15;
}

/* Main */
.main{
margin-left:260px;
padding:20px;
}

.title{
font-size:26px;
margin-bottom:20px;
color:#facc15;
}

/* Cards */
.cards{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.card{
flex:1;
min-width:200px;
background: linear-gradient(145deg,#111827,#0b0f1a);
padding:20px;
border-radius:15px;
border:1px solid #1f2937;
box-shadow:0 0 15px rgba(250,204,21,0.05);
}

.card h3{
margin:0;
color:#facc15;
}

.card p{
color:#9ca3af;
margin-top:10px;
}

/* glow */
.card:hover{
transform:translateY(-5px);
transition:0.3s;
box-shadow:0 0 25px rgba(250,204,21,0.15);
}
</style>

</head>
<body>

<div class="sidebar">
<div class="logo">JARVES</div>

<div class="menu">
<p>🏠 Home</p>
<p>💬 Messages</p>
<p>👥 Groups</p>
<p>👤 Users</p>
<p>⚙️ Settings</p>
</div>
</div>

<div class="main">

<div class="title">Dashboard</div>

<div class="cards">

<div class="card">
<h3>Messages</h3>
<p>0 today</p>
</div>

<div class="card">
<h3>Groups</h3>
<p>0 total</p>
</div>

<div class="card">
<h3>Users</h3>
<p>0 active</p>
</div>

<div class="card">
<h3>Uptime</h3>
<p>0h 0m</p>
</div>

</div>

</div>

</body>
</html>
