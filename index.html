<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Dashboard</title>

<style>

background:#0f172a;

}

.sidebar{

height:100vh;

position:fixed;
padding:20px;
}

.main{
margin-left:240px;
padding:20px;
}

.card{

padding:20px;
margin:10px;
border-radius:12px;

width:200px;
}

h1{margin:0 0 20px 0;}
p{color:#9ca3af;}
</style>

</head>
<body>

<div class="sidebar">
<h2>Bot Panel</h2>
<p>Home</p>
<p>Messages</p>
<p>Groups</p>
<p>Users</p>
</div>

<div class="main">
<h1>Dashboard</h1>

<div class="card">
<h3>Messages</h3>
<p>0</p>
</div>

<div class="card">
<h3>Groups</h3>
<p>0</p>
</div>

<div class="card">
<h3>Users</h3>
<p>0</p>
</div>

<div class="card">
<h3>Uptime</h3>
<p>0h</p>
</div>

</div>

</body>
</html>
