<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#e5e7eb;
}

/* TOP BAR */
.topbar{
height:60px;
background:#0f172a;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
border-bottom:1px solid #1f2937;
position:fixed;
width:100%;
top:0;
z-index:100;
}

.menu-btn{
font-size:26px;
cursor:pointer;
color:#facc15;
}

.status{
font-size:12px;
padding:6px 10px;
border-radius:20px;
background:#1f2937;
color:#9ca3af;
}

.status.online{
color:#22c55e;
border:1px solid #22c55e;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:60px;
left:-260px;
width:260px;
height:100%;
background:#0f172a;
border-right:1px solid #1f2937;
padding:15px;
transition:0.3s;
}

.sidebar.open{
left:0;
}

.sidebar a{
display:block;
padding:10px;
margin:5px 0;
color:#cbd5e1;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{
background:#1f2937;
color:#facc15;
}

/* MAIN */
.main{
margin-top:80px;
padding:15px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
border:1px solid #1f2937;
}

.card h3{
margin:0;
color:#facc15;
}

.small{
color:#94a3b8;
font-size:13px;
margin-top:5px;
}
</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

<div class="menu-btn" onclick="toggle()">☰</div>

<div style="font-weight:bold;color:#facc15;">
DASHBOARD
</div>

<div class="status" id="status">● Checking...</div>

</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<a href="#">🏠 Home</a>
<a href="#">📊 Overview</a>
<a href="#">🤖 AI Control</a>
<a href="#">👥 Groups</a>
<a href="#">💬 Messages</a>
<a href="#">🎫 Tickets</a>
<a href="#">🛡 Security</a>

</div>

<!-- MAIN -->
<div class="main">

<h2 style="color:#facc15;">Main Overview</h2>

<div class="cards">

<div class="card">
<h3>Messages</h3>
<div class="small">0 today</div>
</div>

<div class="card">
<h3>Groups</h3>
<div class="small">0 active</div>
</div>

<div class="card">
<h3>Users</h3>
<div class="small">0 online</div>
</div>

<div class="card">
<h3>System</h3>
<div class="small">Running</div>
</div>

</div>

</div>

<script>
function toggle(){
document.getElementById("sidebar").classList.toggle("open");
}

/* CONNECT TO BACKEND */
fetch("http://localhost:3000/status")
.then(res => res.json())
.then(data => {
if(data.status === "online"){
document.getElementById("status").innerHTML = "● Connected";
document.getElementById("status").style.color = "#22c55e";
}else{
document.getElementById("status").innerHTML = "● Offline";
document.getElementById("status").style.color = "red";
}
})
.catch(()=>{
document.getElementById("status").innerHTML = "● Disconnected";
document.getElementById("status").style.color = "red";
});
</script>

</body>
</html>
